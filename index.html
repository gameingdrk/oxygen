<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة أسطوانات الأكسجين | Oxygen Manager Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar-custom {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 10px 0;
        }
        .supplies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .supply-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .supply-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        .supply-header {
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .supply-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .supply-badge.exchangeable { background: #10b981; color: white; }
        .supply-badge.non-exchangeable { background: #f59e0b; color: white; }
        .supply-title {
            font-size: 1.3rem;

        .supply-type { color: #6b7280; font-size: 0.9rem; }
        .counts-container {

            padding: 20px;

            background: #f9fafb;
        }
        .count-box {

            text-align: center;
            padding: 15px;
            border-radius: 15px;
        }
        .count-box.full {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .count-box.empty {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        .count-number {
            font-size: 2rem;
            font-weight: 800;
        }
        .count-label { font-size: 0.85rem; opacity: 0.9; }
        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }
        .exchange-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .import-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .export-btn { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .fill-btn { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
        .action-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .search-wrapper {
            position: relative;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-input {

            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        .branch-header {
            margin-bottom: 20px;
        }
        .branch-tabs {
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .branch-tab {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f3f4f6;
        }
        .branch-tab:hover {
            background: #e5e7eb;
        }
        .branch-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .branch-tab i {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .branch-tab span:not(.branch-count) {
            display: block;
            font-weight: 600;
        }
        .branch-count {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 5px;
            font-size: 0.9rem;
        }
        .branch-tab:not(.active) .branch-count {
            background: #667eea;
            color: white;
        }
        @media (max-width: 768px) {
            .branch-tabs {
                flex-direction: column;
            }
        }
        .fab-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            z-index: 1000;
        }
        .db-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;

        }
        @media (max-width: 768px) {
            .stats-grid, .supplies-grid { grid-template-columns: 1fr; }
            .stat-value { font-size: 1.8rem; }
        }
        .number-animation { animation: numberPop 0.3s ease; }
        @keyframes numberPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 25px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 380px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo i {
            font-size: 4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-logo h2 {
            margin-top: 15px;
            color: #333;
            font-weight: 700;
        }
        .form-control-custom {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            height: 50px;
            text-align: center;
            direction: ltr;
        }
        .form-control-custom:focus {
            border-color: #667eea;
            outline: none;
        }
        .form-label {
            color: #4b5563;
            text-align: center;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .app-container { display: none; }
        
        /* Admin Panel Styles */
        .admin-panel {
            padding: 20px;
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .admin-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .admin-btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        .admin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .admin-btn.users { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .admin-btn.supplies { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .admin-btn.operations { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e5e7eb;
        }
        .admin-table th {
            background: #f5f7fa;
            font-weight: 600;
        }
        .admin-table tr:hover {
            background: #f9fafb;
        }
        
        .back-btn {
            padding: 10px 20px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .add-form {
            background: #f9fafb;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .add-form input, .add-form select {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-bolt"></i>
                <h2>Oxygen Manager Pro</h2>
            </div>
            <form id="loginForm">
                <div class="mb-3" style="margin-bottom: 25px;">
                    <label class="form-label fw-bold">اسم المستخدم</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 12px 0 0 12px; border: 2px solid #e5e7eb; border-right: none; background: white;">
                            <i class="fas fa-user" style="color: #667eea;"></i>
                        </span>
                        <input type="text" id="username" class="form-control form-control-custom" placeholder="أدخل اسم المستخدم" required style="border-radius: 0 12px 12px 0; border-left: none;">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">كلمة المرور</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 12px 0 0 12px; border: 2px solid #e5e7eb; border-right: none; background: white;">
                            <i class="fas fa-lock" style="color: #667eea;"></i>
                        </span>
                        <input type="password" id="password" class="form-control form-control-custom" placeholder="أدخل كلمة المرور" required style="border-radius: 0 12px 12px 0; border-left: none;">
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="app-container">
        <div class="container" id="app">
            <div id="errorMessage" style="display: none;"></div>
            
            

            <!-- Admin Section -->
            <div id="adminSection" style="display: none;"></div>

            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن مستلزم...">
            </div>
            
            <!-- Branch Selector Header -->
            <div class="branch-header">
                <div class="branch-tabs" id="branchTabs">
                    <div class="branch-tab active" data-branch="main" onclick="selectBranch('main')">
                        <i class="fas fa-star"></i>
                        <span>الفرع الرئيسي</span>
                        <span class="branch-count" id="count-main">0</span>
                    </div>
                    <div class="branch-tab" data-branch="smalat" onclick="selectBranch('smalat')">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>فرع سمالوط</span>
                        <span class="branch-count" id="count-smalat">0</span>
                    </div>
                    <div class="branch-tab" data-branch="menia" onclick="selectBranch('menia')">
                        <i class="fas fa-building"></i>
                        <span>فرع المنيا الجديدة</span>
                        <span class="branch-count" id="count-menia">0</span>
                    </div>
                </div>
            </div>
            
            <div class="text-center mb-4" style="background:white; padding:15px; border-radius:15px;">
                <span style="font-size:1.2rem;">إجمالي المخزون: </span>
                <strong id="totalFull" style="font-size:1.5rem; color:#667eea;">0</strong>
            </div>
            
            <div class="main-content">
                <div id="suppliesList" class="supplies-grid"></div>
            </div>
        </div>

        <button class="fab-button" onclick="scrollToTop()">
            <i class="fas fa-arrow-up"></i>
        </button>
        <div class="db-status" id="dbStatus">🔄 جاري التحميل...</div>
    </div>

    <script>
        const SUPABASE_CONFIG = {
            url: "https://vvcrbweiuhkocoqezdzw.supabase.co",
            anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2Y3Jid2VpdWhrb2NvcWV6ZHp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTg4NzEsImV4cCI6MjA5MDg5NDg3MX0.JiE-PvnwAkSpNNlKMS6T5GkRgjSN3BlZhqTJy-u63_U"
        };

        let supabaseClient = null;
        let currentSupplies = [];
        let useLocalStorage = true;
        let exchangeHistory = [];
        let stockMovements = [];
        let fillHistory = [];
        let currentUser = null;
        let isAdmin = false;
        let dbUsers = [];
        
        // Global error handler
        window.onerror = function(msg, url, line) {
            console.error('JS Error:', msg, 'Line:', line);
            return false;
        };
        
        // Branch data structure
        const BRANCHES = {
            main: { id: 'main', name: 'الفرع الرئيسي', icon: 'fa-star' },
            smalat: { id: 'smalat', name: 'فرع سمالوط', icon: 'fa-map-marker-alt' },
            menia: { id: 'menia', name: 'فرع المنيا الجديدة', icon: 'fa-building' }
        };
        
        let currentBranch = 'main';

        function md5(string) {
            return CryptoJS.MD5(string).toString();
        }

        function checkLogin() {
            const savedUser = localStorage.getItem('oxygen_current_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                isAdmin = currentUser.role === 'admin';
                showApp();
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                Swal.fire('❌ خطأ', 'الرجاء إدخال اسم المستخدم وكلمة المرور', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

            try {
                let loggedIn = false;
                let userRole = 'user';
                
                // Try Supabase first
                if (!useLocalStorage && supabaseClient) {
                    const { data, error } = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('username', username)
                        .single();

                    if (!error && data) {
                        const hashedPassword = md5(password);
                        if (data.password === hashedPassword) {
                            currentUser = data;
                            isAdmin = currentUser.role === 'admin';
                            localStorage.setItem('oxygen_current_user', JSON.stringify(data));
                            loggedIn = true;
                        }
                    }
                }
                
                // Local fallback - only for admin with correct password
                if (!loggedIn && username === 'admin' && password === '2141') {
                    currentUser = { id: 1, username: 'admin', full_name: 'المدير العام', role: 'admin' };
                    isAdmin = true;
                    localStorage.setItem('oxygen_current_user', JSON.stringify(currentUser));
                    loggedIn = true;
                }
                
                if (loggedIn) {
                    showApp();
                } else {
                    Swal.fire('❌ خطأ', 'اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                }
            } catch (error) {
                console.log('Login error:', error);
                Swal.fire('❌ خطأ', 'اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
            }
        }

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            initSupabase();
        }

        function logout() {
            Swal.fire({
                title: 'تسجيل الخروج',
                text: 'هل أنت متأكد؟',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'نعم',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#dc3545'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('oxygen_current_user');
                    currentUser = null;
                    isAdmin = false;
                    // Show login screen
                    document.getElementById('loginScreen').style.display = 'flex';
                    document.getElementById('appContainer').style.display = 'none';
                    // Hide admin panel if visible
                    const adminSection = document.getElementById('adminSection');
                    if (adminSection) {
                        adminSection.style.display = 'none';
                    }
                    document.getElementById('loginForm').reset();
                }
            });
        }

        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        checkLogin();

        const DEFAULT_SUPPLIES = [
            { id: 1, name: "أسطوانة أكسجين 5 لتر", type: "oxygen", full_count: 25, empty_count: 8, can_be_exchanged: true },
            { id: 2, name: "أسطوانة أكسجين 10 لتر", type: "oxygen", full_count: 15, empty_count: 5, can_be_exchanged: true },
            { id: 3, name: "قناع أكسجين", type: "accessories", full_count: 50, empty_count: 0, can_be_exchanged: false },
            { id: 4, name: "منظم ضغط", type: "accessories", full_count: 30, empty_count: 0, can_be_exchanged: false },
            { id: 5, name: "خرطاق أكسجين", type: "accessories", full_count: 40, empty_count: 0, can_be_exchanged: false },
            { id: 6, name: "أسطوانة أكسجين 15 لتر", type: "oxygen", full_count: 10, empty_count: 3, can_be_exchanged: true }
        ];

        function loadLocalData() {
            try {
                const savedSupplies = localStorage.getItem('oxygen_supplies');
                if (savedSupplies) {
                    currentSupplies = JSON.parse(savedSupplies);
                } else {
                    currentSupplies = JSON.parse(JSON.stringify(DEFAULT_SUPPLIES));
                }
                
                const savedExchanges = localStorage.getItem('oxygen_exchanges');
                exchangeHistory = savedExchanges ? JSON.parse(savedExchanges) : [];
                
                const savedMovements = localStorage.getItem('oxygen_movements');
                stockMovements = savedMovements ? JSON.parse(savedMovements) : [];
                
                const savedFills = localStorage.getItem('oxygen_fills');
                fillHistory = savedFills ? JSON.parse(savedFills) : [];
                
                return true;
            } catch (e) {
                currentSupplies = JSON.parse(JSON.stringify(DEFAULT_SUPPLIES));
                exchangeHistory = [];
                stockMovements = [];
                fillHistory = [];
                return false;
            }
        }

        function saveLocalData() {
            try {
                localStorage.setItem('oxygen_supplies', JSON.stringify(currentSupplies));
                localStorage.setItem('oxygen_exchanges', JSON.stringify(exchangeHistory));
                localStorage.setItem('oxygen_movements', JSON.stringify(stockMovements));
                localStorage.setItem('oxygen_fills', JSON.stringify(fillHistory));
                return true;
            } catch (e) {
                return false;
            }
        }

        async function initSupabase() {
            try {
                // Only create if not already created and supabase is loaded
                if (typeof supabase !== "undefined" && !supabaseClient) {
                    supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
                    
                    const { data, error } = await supabaseClient
                        .from("supplies")
                        .select("*")
                        .limit(1);
                    
                    if (!error) {
                        useLocalStorage = false;
                        document.getElementById("dbStatus").innerHTML = "✅ متصل بقاعدة البيانات";
                        document.getElementById("dbStatus").style.background = "rgba(16, 185, 129, 0.9)";
                        await loadFromSupabase();
                        return true;
                    }
                }
            } catch (error) {
                console.log("Cannot connect to Supabase:", error.message);
            }
            
            useLocalStorage = true;
            document.getElementById("dbStatus").innerHTML = "💾 وضع التخزين المحلي";
            document.getElementById("dbStatus").style.background = "rgba(245, 158, 11, 0.9)";
            loadLocalData();
            await loadUsersFromSupabase();
            updateStatistics();
            renderSupplies();
            return false;
        }

        async function loadUsersFromSupabase() {
            if (!supabaseClient) return;
            try {
                const { data } = await supabaseClient.from("users").select("*");
                if (data) dbUsers = data;
            } catch (e) {
                console.log("Users load skipped");
            }
        }

        async function loadFromSupabase() {
            if (!supabaseClient) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from("supplies")
                    .select("*")
                    .order("id");
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    currentSupplies = data;
                } else {
                    for (const supply of DEFAULT_SUPPLIES) {
                        await supabaseClient.from("supplies").insert([supply]);
                    }
                    currentSupplies = JSON.parse(JSON.stringify(DEFAULT_SUPPLIES));
                }
                
                exchangeHistory = [];
                stockMovements = [];
                fillHistory = [];
                
                await loadHistoryFromSupabase();
                await loadUsersFromSupabase();
                updateStatistics();
                renderSupplies();
            } catch (error) {
                console.error("Error loading from Supabase:", error);
                useLocalStorage = true;
                loadLocalData();
                await loadUsersFromSupabase();
                updateStatistics();
                renderSupplies();
            }
        }

        async function loadHistoryFromSupabase() {
            if (!supabaseClient) return;
            
            try {
                const today = new Date().toISOString().split('T')[0];
                const startOfDay = today + 'T00:00:00';
                const endOfDay = today + 'T23:59:59';
                
                const { data: exchanges } = await supabaseClient
                    .from("exchange_history")
                    .select("*")
                    .gte('exchange_date', startOfDay)
                    .lte('exchange_date', endOfDay)
                    .order('exchange_date', { ascending: false });
                
                if (exchanges) exchangeHistory = exchanges;
                
                const { data: movements } = await supabaseClient
                    .from("stock_movements")
                    .select("*")
                    .gte('movement_date', startOfDay)
                    .lte('movement_date', endOfDay)
                    .order('movement_date', { ascending: false });
                
                if (movements) stockMovements = movements;
                
                const { data: fills } = await supabaseClient
                    .from("fill_history")
                    .select("*")
                    .gte('fill_date', startOfDay)
                    .lte('fill_date', endOfDay)
                    .order('fill_date', { ascending: false });
                
                if (fills) fillHistory = fills;
            } catch (error) {
                console.log("History tables not found, using local");
            }
        }

        async function updateStatistics() {
            const totalFull = currentSupplies.reduce((sum, item) => sum + (item.full_count || 0), 0);
            const el = document.getElementById("totalFull");
            if (el) el.textContent = totalFull;
            
            updateBranchCounts();
        }
        
        function updateBranchCounts() {
            const branchCounts = { main: 0, smalat: 0, menia: 0 };
            currentSupplies.forEach(item => {
                const branch = item.branch || 'main';
                if (branchCounts[branch] !== undefined) {
                    branchCounts[branch] += item.full_count || 0;
                }
            });
            const mainEl = document.getElementById('count-main');
            const smalatEl = document.getElementById('count-smalat');
            const meniaEl = document.getElementById('count-menia');
            if (mainEl) mainEl.textContent = branchCounts.main;
            if (smalatEl) smalatEl.textContent = branchCounts.smalat;
            if (meniaEl) meniaEl.textContent = branchCounts.menia;
        }
        
        window.selectBranch = function(branchId) {
            currentBranch = branchId;
            document.querySelectorAll('.branch-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.branch === branchId) {
                    tab.classList.add('active');
                }
            });
            renderSupplies();
        };

        function renderSupplies() {
            const searchInput = document.getElementById("searchInput");
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : "";
            const filtered = currentSupplies.filter(
                (item) => (item.name && item.name.toLowerCase().includes(searchTerm)) && 
                         (item.branch === currentBranch || !item.branch && currentBranch === 'main')
            );

            const container = document.getElementById("suppliesList");
            if (!container) return;
            container.innerHTML = "";

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center p-5 bg-white rounded-3"><i class="fas fa-box-open fa-3x text-muted"></i><p class="mt-3">لا توجد نتائج</p></div>';
                return;
            }

            filtered.forEach((supply) => {
                const item = document.createElement("div");
                item.className = "supply-item";

                let buttons = "";
                if (supply.can_be_exchanged) {
                    buttons = `<div class="action-buttons">
                        <button class="action-btn exchange-btn" onclick="showExchangeDialog(${supply.id})"><i class="fas fa-sync-alt"></i> استبدال</button>
                        <button class="action-btn" style="background:#8b5cf6;color:white;" onclick="showFillDialog(${supply.id})"><i class="fas fa-gas-pump"></i> ملئ</button>
                    </div>`;
                } else {
                    buttons = `<div class="action-buttons">
                        <button class="action-btn import-btn" onclick="showImportDialog(${supply.id})"><i class="fas fa-download"></i> استلام</button>
                        <button class="action-btn export-btn" onclick="showExportDialog(${supply.id})" ${supply.full_count === 0 ? "disabled" : ""}><i class="fas fa-upload"></i> تسليم</button>
                    </div>`;
                }

                item.innerHTML = `
                    <div class="supply-header" style="position:relative;">
                        <div class="supply-badge ${supply.can_be_exchanged ? "exchangeable" : "non-exchangeable"}">${supply.can_be_exchanged ? "✓ قابل للاستبدال" : "📦 مواد استهلاكية"}</div>
                        <div class="supply-title">${supply.name}</div>

                    </div>
                    ${buttons}
                `;
                container.appendChild(item);

        async function updateStock(supplyId, type, quantity, notes) {
            Swal.fire({ title: "جاري المعالجة...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const supplyIndex = currentSupplies.findIndex((s) => s.id === supplyId);
                if (supplyIndex === -1) throw new Error("العنصر غير موجود");
                
                const supply = currentSupplies[supplyIndex];
                const newQuantity = type === "import" ? supply.full_count + quantity : supply.full_count - quantity;
                
                if (newQuantity < 0) throw new Error("الكمية غير كافية");
                
                supply.full_count = newQuantity;
                currentSupplies[supplyIndex] = supply;
                
                const movement = {
                    id: Date.now(),
                    supply_id: supplyId,
                    branch: currentBranch,
                    movement_type: type,
                    quantity: quantity,
                    notes: typeof notes === 'object' ? JSON.stringify(notes) : notes,
                    operator_name: currentUser?.full_name || "مدير النظام",
                    recipient_name: notes?.recipient_name || "",
                    recipient_phone: notes?.recipient_phone || "",
                    recipient_job: notes?.recipient_job || "",
                    recipient_age: notes?.recipient_age || null,
                    recipient_marital_status: notes?.recipient_marital_status || "",
                    movement_date: new Date().toISOString()
                };
                stockMovements.unshift(movement);
                
                saveLocalData();
                
                let supabaseSaveFailed = false;
                if (!useLocalStorage && supabaseClient) {
                    try {
                        await supabaseClient
                            .from("supplies")
                            .update({ full_count: newQuantity, updated_at: new Date().toISOString() })
                            .eq("id", supplyId);
                        
                        await supabaseClient.from("stock_movements").insert([movement]);
                        await loadHistoryFromSupabase();
                    } catch (e) {
                        supabaseSaveFailed = true;
                    }
                }
                
                updateNumberAnimation(supplyId, newQuantity);
                await updateStatistics();
                
                Swal.fire({
                    icon: "success",
                    title: type === "import" ? "تم الاستلام بنجاح!" : "تم التسليم بنجاح!",
                    html: `<div class="text-center"><p><strong>${supply.name}</strong></p><p>الكمية: <strong>${quantity}</strong></p><p>الرصيد الجديد: <strong>${newQuantity}</strong></p></div>`,
                    timer: 2500, showConfirmButton: false
                });
            } catch (error) {
                Swal.fire("❌ خطأ", error.message, "error");
            }
        }

        async function performExchange(supplyId, quantity, customerName, customerPhone, customerJob = "", customerAge = null, customerMaritalStatus = "", exchangeReason = "") {
            Swal.fire({ title: "جاري المعالجة...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const supplyIndex = currentSupplies.findIndex((s) => s.id === supplyId);
                if (supplyIndex === -1) throw new Error("العنصر غير موجود");
                
                const supply = currentSupplies[supplyIndex];
                const newFullCount = supply.full_count - quantity;
                const newEmptyCount = supply.empty_count + quantity;
                
                if (newFullCount < 0) throw new Error("الكمية غير كافية");
                
                supply.full_count = newFullCount;
                supply.empty_count = newEmptyCount;
                currentSupplies[supplyIndex] = supply;
                
                const exchange = {
                    id: Date.now(),
                    supply_id: supplyId,
                    branch: currentBranch,
                    customer_name: customerName,
                    customer_phone: customerPhone,
                    customer_job: customerJob,
                    customer_age: customerAge,
                    customer_marital_status: customerMaritalStatus,
                    exchange_reason: exchangeReason,
                    quantity: quantity,
                    operator_name: currentUser?.full_name || "مدير النظام",
                    status: "completed",
                    exchange_date: new Date().toISOString()
                };
                exchangeHistory.unshift(exchange);
                
                saveLocalData();
                
                let supabaseSaveFailed = false;
                if (!useLocalStorage && supabaseClient) {
                    try {
                        await supabaseClient
                            .from("supplies")
                            .update({ 
                                full_count: newFullCount, 
                                empty_count: newEmptyCount, 
                                updated_at: new Date().toISOString() 
                            })
                            .eq("id", supplyId);
                        
                        await supabaseClient.from("exchange_history").insert([exchange]);
                        await loadHistoryFromSupabase();
                    } catch (e) {
                        supabaseSaveFailed = true;
                    }
                }

                updateNumberAnimation(supplyId, newFullCount);
                const emptyElement = document.getElementById(`empty-${supplyId}`);
                if (emptyElement) { 
                    emptyElement.classList.add("number-animation"); 
                    emptyElement.textContent = newEmptyCount; 
                    setTimeout(() => emptyElement.classList.remove("number-animation"), 300); 
                }
                
                await updateStatistics();
                
                const reasonText = exchangeReason === 'وفاة' ? '⚱️ وفاة' : '💚 شفاء';
                Swal.fire({
                    icon: "success", title: "تم الاستبدال بنجاح!",
                    html: `<div class="text-center"><p><strong>${supply.name}</strong></p><p>الكمية: <strong>${quantity}</strong></p><p>👤 ${customerName}</p><p>📞 ${customerPhone}</p><p>${reasonText}</p><hr><p>المتبقي: <strong>${newFullCount}</strong> ممتلئة | <strong>${newEmptyCount}</strong> فارغة</p></div>`,
                    timer: 3000, showConfirmButton: false
                });
            } catch (error) {
                Swal.fire("❌ خطأ", error.message, "error");
            }
        }

                    }).eq("id", supplyId);

        window.deleteOperation = async function(id, type, quantity, supplyId) {
            const { isConfirmed } = await Swal.fire({
                title: 'حذف العملية',
                text: 'هل أنت متأكد؟ سيتم إرجاع الكمية.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، حذف',
                cancelButtonText: 'إلغاء'
            });

            if (!isConfirmed) return;

            const supplyIndex = currentSupplies.findIndex(s => s.id === supplyId);
            if (supplyIndex === -1) return;

            const supply = currentSupplies[supplyIndex];

            if (type === 'استبدال') {
                supply.full_count += quantity;
                supply.empty_count -= quantity;
                exchangeHistory = exchangeHistory.filter(e => e.id !== id);
            } else if (type === 'استلام') {
                supply.full_count -= quantity;
                stockMovements = stockMovements.filter(m => m.id !== id);
            } else if (type === 'تسليم') {
                supply.full_count += quantity;
                stockMovements = stockMovements.filter(m => m.id !== id);
            } else if (type === 'ملئ') {
                supply.full_count -= quantity;
                supply.empty_count += quantity;
                fillHistory = fillHistory.filter(f => f.id !== id);
            }

            currentSupplies[supplyIndex] = supply;
            saveLocalData();

            if (!useLocalStorage && supabaseClient) {
                await supabaseClient.from("supplies").update({
                    full_count: supply.full_count,
                    empty_count: supply.empty_count,
                    updated_at: new Date().toISOString()
                }).eq("id", supplyId);

                if (type === 'استبدال') {
                    await supabaseClient.from("exchange_history").delete().eq("id", id);
                } else if (type === 'ملئ') {
                    await supabaseClient.from("fill_history").delete().eq("id", id);
                } else {
                    await supabaseClient.from("stock_movements").delete().eq("id", id);
                }
            }

            Swal.fire('✅ نجاح', 'تم الحذف وإرجاع الكمية', 'success');
            await updateStatistics();
            renderSupplies();
            showAllOperations();
        };

            await initSupabase();
            
            // Admin sees admin panel directly, regular users see main page
            if (isAdmin) {
                showAdminPanel();
            }
            
            setInterval(async () => {
                if (!useLocalStorage && supabaseClient) {
                    await loadFromSupabase();
                } else {
                    saveLocalData();
                    renderSupplies();
                }
            }, 30000);
        });
    </script>
</body>
</html>
